name: Android App Automation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

    # Cancels all previous workflow runs for pull requests that have not completed.
concurrency:
  # The concurrency group contains the workflow name and the branch name for pull requests or the commit hash for any other events.
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.sha }}
  cancel-in-progress: true

# workflow permissions
permissions:
  checks: write
  contents: write
  issues: write
  pull-requests: write

# workflow environment variables
env:
  FORCE_COLOR: 1
  # SHA: ${{ github.event.pull_request.head.sha }}
  # LOCAL_APP: ./apk/test.apk
  # SENDGRID_FROM: ${{secrets.SENDGRID_FROM}}
  # SENDGRID_HOST: ${{secrets.SENDGRID_HOST}}
  # SENDGRID_PORT: ${{secrets.SENDGRID_PORT}}
  # SENDGRID_USER: ${{secrets.SENDGRID_USER}}
  # SENDGRID_PASS: ${{secrets.SENDGRID_PASS}}
  GITHUB_TOKEN: ${{ secrets.GT_TOKEN }}

jobs:
  test:
    name: app test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout testing repo
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          npm ci || npm i

      - name: Run tests
        run: |
          npm run test

      # - name: 📊 Generate Test report
      #   run: |
      #     npm run report:generate
      #     ls -lh allure-report


    # --- START OF ALLURE HISTORY LOGIC ---

      - name: Get Allure History
        if: always()
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages-dir

      - name: Generate Allure Report
        if: always()
        uses: simple-elf/allure-report-action@v1.13
        with:
          gh_pages: gh-pages-dir
          allure_results: allure-results
          allure_history: allure-history
          # allure_report: allure-report
          # keep_reports: 20 # Keeps history of the last 20 runs

      - name: 🚀 Deploy Allure Report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history





